      message:
        example: human-readable description of error
        type: string
    type: object
  internal_features_users_transport_http.CreateUserRequest:
    properties:
      full_name:
        example: Глебати Станюлити
        maxLength: 100
        minLength: 3
        type: string
      phone_number:
        example: "+77766655544"
        maxLength: 15
        minLength: 10
        type: string
    required:
    - full_name
    type: object
  internal_features_users_transport_http.CreateUserResponse:
    properties:
      full_name:
        example: Номинальный Номинал Номиналович
        type: string
      id:
        example: 12
        type: integer
      phone_number:
        example: "+1234567890123"
        type: string
